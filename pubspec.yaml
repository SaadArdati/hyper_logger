name: hyper_logger
description: Beautiful, composable logging for Dart with automatic environment detection, scoped loggers, and crash reporting.
version: 0.1.0
repository: https://github.com/SaadArdati/hyper_logger
topics:
  - logging
  - logger
  - debug
  - diagnostics

environment:
  sdk: ^3.8.0

dependencies:
  logging: ^1.3.0
  stack_trace: ^1.12.1
  universal_io: ^2.3.1
  web: ^1.1.1

dev_dependencies:
  test: ^1.31.0
  lints: ^6.1.0
  fake_async: ^1.3.3
