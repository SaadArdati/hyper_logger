name: hyper_logger
description: >-
  Composable logging for Dart and Flutter with automatic environment
  detection, scoped loggers, request-context propagation, file rotation,
  GCP/AWS/Azure JSON output, and a Crashlytics-friendly delegate API.
version: 0.2.0
repository: https://github.com/SaadArdati/hyper_logger
issue_tracker: https://github.com/SaadArdati/hyper_logger/issues
topics:
  - logging
  - logger
  - cloud
  - flutter
  - observability

environment:
  sdk: ^3.8.0

dependencies:
  clock: ^1.1.1
  logging: ^1.3.0
  meta: ^1.16.0
  path: ^1.9.0
  stack_trace: ^1.12.1
  universal_io: ^2.3.1
  web: ^1.1.1

dev_dependencies:
  test: ^1.31.0
  lints: ^6.1.0
  fake_async: ^1.3.3
